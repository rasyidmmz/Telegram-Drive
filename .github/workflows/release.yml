name: "Release"

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.0.1

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the first version block from CHANGELOG.md (between first and second ## headings)
          BODY=$(awk '/^## \[/{if(found) exit; found=1; next} found' CHANGELOG.md)
          # Escape for GitHub Actions output
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.BODY }}
          RELEASE_VERSION: ${{ steps.get_version.outputs.VERSION }}
        with:
          script: |
            const tag = `v${process.env.RELEASE_VERSION}`;
            try {
              const { data: existingRelease } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag
              });
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existingRelease.id,
                body: process.env.RELEASE_BODY,
                draft: true
              });
              console.log(`Updated existing release for tag ${tag} (ID: ${existingRelease.id})`);
              return existingRelease.id;
            } catch (err) {
              if (err.status === 404) {
                const { data: newRelease } = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  name: `Telegram Drive v${process.env.RELEASE_VERSION}`,
                  body: process.env.RELEASE_BODY,
                  draft: true,
                  prerelease: false
                });
                console.log(`Created new release for tag ${tag} (ID: ${newRelease.id})`);
                return newRelease.id;
              } else {
                throw err;
              }
            }

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './app/src-tauri -> target'

      - name: Setup MPV Sidecar Binary
        shell: bash
        run: |
          mkdir -p app/src-tauri/bin
          echo "Downloading MPV for Windows..."
          curl -L -o mpv.zip "https://github.com/mpv-player/mpv/releases/download/v0.41.0/mpv-v0.41.0-x86_64-pc-windows-msvc.zip"
          7z e mpv.zip mpv.exe -oapp/src-tauri/bin/
          mv app/src-tauri/bin/mpv.exe app/src-tauri/bin/mpv-x86_64-pc-windows-msvc.exe
          rm mpv.zip
          echo "MPV for Windows sidecar configured."

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Prepare Tauri signing key
        shell: node {0}
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          const fs = require('fs');
          const key = process.env.KEY.trim();
          // Tauri expects TAURI_SIGNING_PRIVATE_KEY to be base64-encoded.
          // If the secret is raw key text, base64-encode it; otherwise pass through.
          const b64 = key.startsWith('untrusted comment:')
            ? Buffer.from(key).toString('base64')
            : key;
          fs.appendFileSync(process.env.GITHUB_ENV, `TAURI_SIGNING_PRIVATE_KEY=${b64}\n`);

      - name: Build the app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: ./app
          args: '--bundles nsis'

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })
